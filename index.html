<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcStack - Professional Scientific Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 2rem 1rem; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1100px; display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 992px) { .container { grid-template-columns: 13fr 7fr; } }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; }
        .calc-grid { display: grid; gap: 0.65rem; transition: all 0.3s ease; }
        .mode-basic { grid-template-columns: repeat(4, 1fr); }
        .mode-scientific { grid-template-columns: repeat(5, 1fr); }
        button { padding: 1.1rem 0.5rem; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; }
        .sci-element { display: none; }
        .mode-scientific .sci-element { display: block; }
        .display-screen { background: #020617; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; text-align: right; }
        .current-value { color: #38bdf8; font-size: 2.25rem; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="display-screen">
                <div class="current-value" id="primaryDisplay">0</div>
            </div>
            <div class="calc-grid mode-basic" id="calcGridContainer">
                <button onclick="updateDisplay('7')">7</button>
                <button onclick="updateDisplay('8')">8</button>
                <button onclick="updateDisplay('=')">=</button>
                <button class="btn-clear" onclick="engine.reset()">AC</button>
            </div>
        </div>
    </div>
    <script>
        class CalcStackEngine {
            constructor() {
                this.display = "0";
                this.history = [];
            }
            reset() { this.display = "0"; }
            update(val) { this.display = val; }
        }
        const engine = new CalcStackEngine();
        function updateDisplay(val) {
            engine.update(val);
            document.getElementById('primaryDisplay').innerText = engine.display;
        }
    </script>
</body>
</html>
